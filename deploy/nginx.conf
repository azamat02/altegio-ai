server {
    listen 80;
    server_name altegio.167.99.250.107.nip.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name altegio.167.99.250.107.nip.io;

    ssl_certificate /etc/letsencrypt/live/altegio.167.99.250.107.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/altegio.167.99.250.107.nip.io/privkey.pem;

    client_max_body_size 4m;
    root /usr/share/nginx/html;

    # API — proxied to the NestJS app on the same host
    location = /health {
        proxy_pass http://api:3000;
        access_log off;
    }

    location /tma/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Mini App — static SPA, client-side routing falls back to index.html
    location / {
        try_files $uri /index.html;
    }
}
